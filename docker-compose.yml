services:
  flipt:
    image: ${FLIPT_IMAGE}
    container_name: ${FLIPT_CONTAINER_NAME}
    environment:
      FLIPT_AUTHENTICATION_REQUIRED: ${FLIPT_AUTHENTICATION_REQUIRED}
      FLIPT_AUTHENTICATION_METHODS_TOKEN_ENABLED: ${FLIPT_AUTHENTICATION_METHODS_TOKEN_ENABLED}
      FLIPT_AUTHENTICATION_METHODS_TOKEN_BOOTSTRAP_TOKEN: ${FLIPT_API_TOKEN}
    ports:
      - "${FLIPT_HOST_PORT}:${FLIPT_CONTAINER_PORT}"
    volumes:
      - flipt_data:${FLIPT_DATA_PATH}
    networks:
      - flipt_network

  redis:
    image: redis:7-alpine
    container_name: redis-cache
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - flipt_network

volumes:
  flipt_data:
    name: ${FLIPT_DATA_VOLUME_NAME}
    driver: ${FLIPT_VOLUME_DRIVER}
  redis_data:
    driver: local

networks:
  flipt_network:
    name: ${FLIPT_NETWORK_NAME}
    driver: ${FLIPT_NETWORK_DRIVER}
